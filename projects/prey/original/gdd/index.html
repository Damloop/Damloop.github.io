<!DOCTYPE html>
<html lang="en">

  <title>PREY – GDD</title>

  <style>
    :root {
      --bg: #000;
      --accent: #b00000;
      --text-main: #c8c8c8;
      --text-muted: #8a8a8a;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text-main);
      font-family: 'IM Fell English SC', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    h1 {
      color: var(--accent);
      font-size: 3rem;
      margin: 0;
      text-shadow: 0 0 25px rgba(176,0,0,0.6);
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      transition: 0.3s ease;
    }

    a:hover {
      color: #fff;
      text-shadow: 0 0 20px rgba(255,0,0,0.9);
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
  </style>
