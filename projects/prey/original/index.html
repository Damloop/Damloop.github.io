<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PREY – Unity Platform Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 50% 20%, rgba(0, 50, 80, 0.25), #000 70%);
  color: #d6e8f0;
  padding: 40px 20px;
  text-align: center;
  position: relative;
  overflow-x: hidden;
}

/* Niebla ambiental */
body::before {
  content: "";
  position: fixed;
  top: -20%;
  left: -20%;
  width: 140%;
  height: 140%;
  background: radial-gradient(circle at 50% 50%, rgba(0, 80, 120, 0.25), transparent 70%);
  filter: blur(80px);
  opacity: 0.45;
  animation: fogMove 12s ease-in-out infinite;
  pointer-events: none;
  z-index: -1;
}

@keyframes fogMove {
  0% { transform: translateX(0); opacity: 0.35; }
  50% { transform: translateX(40px); opacity: 0.55; }
  100% { transform: translateX(0); opacity: 0.35; }
}

/* Título estilo videojuego */
h1 {
  font-size: 3.4rem;
  color: #00e0ff;
  text-shadow: 0 0 25px rgba(0,200,255,0.6), 0 0 60px rgba(0,200,255,0.3);
  margin-bottom: 10px;
  letter-spacing: 0.08em;
}

/* Subtítulo */
.subtitle {
  color: #9bbcc7;
  font-size: 1.25rem;
  margin-bottom: 40px;
}

/* Imagen principal estilo portada de videojuego */
.preview-img {
  width: 100%;
  max-width: 900px;
  aspect-ratio: 16/9;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid rgba(0,200,255,0.25);
  box-shadow: 0 0 35px rgba(0,200,255,0.25), 0 0 80px rgba(0,200,255,0.15);
  margin-bottom: 50px;
}

/* Secciones */
.section {
  max-width: 900px;
  margin: 0 auto 50px;
  text-align: left;
  background: rgba(0, 20, 30, 0.45);
  padding: 25px 30px;
  border-radius: 12px;
  border: 1px solid rgba(0,200,255,0.15);
  box-shadow: 0 0 25px rgba(0,200,255,0.15);
  backdrop-filter: blur(6px);
}

/* Títulos de sección */
.section h2 {
  color: #00e0ff;
  font-size: 1.8rem;
  margin-bottom: 15px;
  text-shadow: 0 0 12px rgba(0,200,255,0.35);
}

/* Texto */
.section p {
  color: #b8c9d1;
  font-size: 1.05rem;
  line-height: 1.6;
}

/* Enlaces estilo menú de videojuego */
.file-links a {
  display: block;
  margin: 10px 0;
  color: #00e0ff;
  text-decoration: none;
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  transition: 0.3s ease;
}

.file-links a:hover {
  color: #fff;
  text-shadow: 0 0 15px rgba(0,200,255,0.8);
  transform: translateX(6px);
}

  </style>
</head>

<body>

  <h1>PREY – Unity Platform Game</h1>
  <p class="subtitle">A hero returns to his hometown… but the villagers have turned into zombies.</p>

  <img src="images/prey-cover.png" class="preview-img" alt="PREY Cover">

  <div class="section">
    <h2>Project Files</h2>
    <div class="file-links">
      <a href="gdd/">📘 Game Design Document (GDD)</a>
      <a href="history/">📚 Story & Lore</a>
      <a href="code/">💻 Source Code</a>
      <a href="images/">🖼️ Image Gallery</a>
      <a href="videos/">🎬 Videos & Trailers</a>
    </div>
  </div>

</body>
</html>
