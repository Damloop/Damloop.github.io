<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PREY – Image Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English+SC&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #000;
        --accent: #b00000;
        --text-main: #c8c8c8;
        --panel: rgba(15, 15, 20, 0.7);
        --border: rgba(255, 0, 0, 0.18);
    }

    body {
        margin: 0;
        background: var(--bg);
        color: var(--text-main);
        font-family: 'IM Fell English SC', serif;
        padding: 40px;
        overflow-x: hidden;
    }

    body::before {
        content: "";
        position: fixed;
        top: -40%;
        left: -40%;
        width: 180%;
        height: 180%;
        background:
            radial-gradient(circle at 20% 30%, rgba(255,180,80,0.18), transparent 70%),
            radial-gradient(circle at 70% 80%, rgba(100,100,110,0.35), transparent 75%);
        filter: blur(150px);
        opacity: 0.55;
        animation: fogMove 22s ease-in-out infinite;
        pointer-events: none;
        z-index: -1;
    }

    @keyframes fogMove {
        0%   { transform: translateX(0) translateY(0); opacity: 0.45; }
        25%  { transform: translateX(60px) translateY(40px); opacity: 0.65; }
        50%  { transform: translateX(-40px) translateY(20px); opacity: 0.55; }
        75%  { transform: translateX(30px) translateY(-30px); opacity: 0.65; }
        100% { transform: translateX(0) translateY(0); opacity: 0.45; }
    }

    h1 {
        color: var(--accent);
        text-shadow: 0 0 25px rgba(176,0,0,0.6);
        font-size: 3rem;
        text-align: center;
        margin-bottom: 30px;
    }

    .gallery {
        max-width: 1000px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
    }

    .img-box {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 15px;
        box-shadow: 0 0 25px rgba(255,0,0,0.18);
        backdrop-filter: blur(6px);
        text-align: center;
    }

    .img-box img {
        width: 100%;
        border-radius: 8px;
        border: 1px solid rgba(255,0,0,0.2);
    }

    .img-box p {
        margin-top: 10px;
        font-size: 1rem;
        color: var(--text-main);
    }

    a {
        display: block;
        color: var(--accent);
        text-decoration: none;
        font-size: 1.2rem;
        margin-top: 40px;
        text-align: center;
        transition: 0.3s ease;
    }

    a:hover {
        color: #fff;
        text-shadow: 0 0 20px rgba(255,0,0,0.9);
    }
</style>
</head>

<body>

<h1>PREY – Image Gallery</h1>

<div class="gallery">

    <!-- COVER PRINCIPAL -->
    <div class="img-box">
        <img src="prey-cover.png" alt="PREY Cover">
        <p>PREY – Official Cover</p>
    </div>

    <!-- IMÁGENES ORDENADAS 1 → 10 -->
    <div class="img-box"><img src="1.png" alt="Image 1"><p>Screenshot 1</p></div>
    <div class="img-box"><img src="2.png" alt="Image 2"><p>Screenshot 2</p></div>
    <div class="img-box"><img src="3.png" alt="Image 3"><p>Screenshot 3</p></div>
    <div class="img-box"><img src="4.png" alt="Image 4"><p>Screenshot 4</p></div>
    <div class="img-box"><img src="5.png" alt="Image 5"><p>Screenshot 5</p></div>
    <div class="img-box"><img src="6.png" alt="Image 6"><p>Screenshot 6</p></div>
    <div class="img-box"><img src="7.png" alt="Image 7"><p>Screenshot 7</p></div>
    <div class="img-box"><img src="8.png" alt="Image 8"><p>Screenshot 8</p></div>
    <div class="img-box"><img src="9.png" alt="Image 9"><p>Screenshot 9</p></div>
    <div class="img-box"><img src="10.png" alt="Image 10"><p>Screenshot 10</p></div>

    <!-- COVER FINAL -->
    <div class="img-box">
        <img src="prey-cover2.png" alt="PREY Alternate Cover">
        <p>PREY – Alternate Cover</p>
    </div>

</div>

<a href="../index.html">← Back to PREY</a>

</body>
</html>
