<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ShadowMap – Images</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --panel: #0d0f14;
      --accent: #9b4dff; /* Purple accent for ShadowMap */
      --text-main: #fff;
      --text-muted: #b8b8b8;
      --border: #1f1f25;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      width: 100%;
    }

    html, body {
      overflow-x: hidden;
    }

    * {
      box-sizing: border-box;
      max-width: 100%;
    }

    /* Background */
    body::before {
      content: "";
      position: fixed;
      top: -25%;
      left: -25%;
      width: 150%;
      height: 150%;
      background:
        radial-gradient(circle at 25% 20%, rgba(155, 77, 255, 0.22), transparent 70%),
        radial-gradient(circle at 75% 80%, rgba(120, 50, 255, 0.18), transparent 75%);
      animation: pulseGlow 14s ease-in-out infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.30; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.15); }
      100% { opacity: 0.30; transform: scale(1); }
    }

    /* Navbar */
    .navbar {
      width: 100%;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(22px) saturate(180%);
      border-bottom: 1px solid rgba(155, 77, 255, 0.22);
      box-shadow: 0 4px 35px rgba(155, 77, 255, 0.08);
      z-index: 999;
      flex-wrap: wrap;
    }

    .logo-modern {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--accent);
      padding: 10px 22px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      text-shadow: 0 0 18px rgba(155,77,255,0.6);
      box-shadow: 0 0 22px rgba(155,77,255,0.35);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      transition: 0.35s ease;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .logo-modern:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 35px rgba(155,77,255,0.9);
      transform: translateY(-4px) scale(1.03);
    }

    /* Title */
    h1 {
      text-align: center;
      font-size: 3.4rem;
      margin-top: 90px;
      margin-bottom: 50px;
      color: var(--accent);
      text-shadow: 0 0 25px rgba(155,77,255,0.45);
      opacity: 0;
      animation: fadeHero 1.2s ease forwards;
    }

    @keyframes fadeHero {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Image Grid */
    .gallery {
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 35px;
    }

    .img-card {
      background: var(--panel);
      border-radius: 16px;
      padding: 18px;
      border: 1px solid rgba(155,77,255,0.25);
      box-shadow: 0 10px 25px rgba(0,0,0,0.45);
      transition: 0.35s ease;
      text-align: center;
    }

    .img-card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 20px 45px rgba(155,77,255,0.25);
      border-color: var(--accent);
    }

    .img-card img {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      aspect-ratio: 16/9;
      filter: brightness(1.1) contrast(1.2);
      transition: 0.35s ease;
    }

    .img-card:hover img {
      filter: brightness(1.2) contrast(1.3);
    }

    footer {
      text-align: center;
      padding: 55px 20px 65px;
      opacity: 0.7;
      font-size: 1rem;
      border-top: 1px solid rgba(155,77,255,0.18);
    }
  </style>
</head>

<body>

<nav class="navbar">
  <a href="/" class="logo-modern">DL</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/contact/">Contact</a>
  </div>
</nav>

<main>

<h1>ShadowMap – Images</h1>

<div class="gallery">

  <!-- Replace with your images -->
  <div class="img-card">
    <img src="/projects/shadowmap/imagen/shadowmap-logo.jpg" alt="ShadowMap Logo">
  </div>

</div>

</main>

<footer>
  © 2026 – ShadowMap Project by Damián López
</footer>

</body>
</html>
