<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact – Damián López</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --panel: #0d0f14;
      --accent: #00e0ff;
      --text-main: #ffffff;
      --text-muted: #b8b8b8;
      --border: #1f1f25;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      width: 100%;
    }

    html, body {
      overflow-x: hidden;
    }

    * {
      box-sizing: border-box;
      max-width: 100%;
    }

    /* Fondo premium */
    body::before {
      content: "";
      position: fixed;
      top: -20%;
      left: -20%;
      width: 140%;
      height: 140%;
      background:
        radial-gradient(circle at 30% 20%, rgba(0, 224, 255, 0.18), transparent 70%),
        radial-gradient(circle at 70% 80%, rgba(0, 150, 255, 0.12), transparent 75%);
      animation: pulseGlow 12s ease-in-out infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.35; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.12); }
      100% { opacity: 0.35; transform: scale(1); }
    }

    /* NAVBAR premium */
    .navbar {
      width: 100%;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(18px) saturate(180%);
      border-bottom: 1px solid rgba(0, 224, 255, 0.15);
      box-shadow: 0 4px 25px rgba(0, 224, 255, 0.05);
      z-index: 999;
      flex-wrap: wrap;
    }

    .logo-modern {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--accent);
      padding: 8px 18px;
      border: 3px solid var(--accent);
      border-radius: 10px;
      text-shadow: 0 0 18px rgba(0,200,255,0.6);
      box-shadow: 0 0 25px rgba(0,200,255,0.35);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      transition: 0.35s ease;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .logo-modern:hover {
      background: var(--accent);
      color: #000;
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 0 35px rgba(0,200,255,0.9);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-links a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,200,255,0.6);
    }

    /* TITLE premium */
    h1 {
      text-align: center;
      font-size: 3rem;
      margin-top: 80px;
      margin-bottom: 40px;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(0,200,255,0.4);
      opacity: 0;
      animation: fadeHero 1.2s ease forwards;
    }

    @keyframes fadeHero {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CONTACT BOX premium */
    .contact-box {
      max-width: 700px;
      margin: 0 auto;
      padding: 30px;
      background: var(--panel);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 0 25px rgba(0,200,255,0.08);
      text-align: center;
      transition: 0.35s ease;
    }

    .contact-box:hover {
      box-shadow: 0 0 35px rgba(0,200,255,0.18);
      transform: translateY(-4px);
    }

    .contact-item {
      margin: 18px 0;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    .contact-item span {
      color: var(--accent);
      font-weight: 600;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    a:hover {
      text-shadow: 0 0 10px rgba(0,200,255,0.6);
    }

    footer {
      text-align: center;
      padding: 45px 20px 55px;
      opacity: 0.8;
      font-size: 0.95rem;
      border-top: 1px solid rgba(0,224,255,0.15);
    }
  </style>
</head>

<body>

<nav class="navbar">
  <a href="/" class="logo-modern">DL</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/contact/">Contact</a>
  </div>
</nav>

<main>

<h1>Contact</h1>

<div class="contact-box">
  <div class="contact-item">
    <span>Email:</span> 
    <a href="mailto:lopez.damian@outlook.com" target="_blank">
      lopez.damian@outlook.com
    </a>
  </div>

  <div class="contact-item">
    <span>LinkedIn:</span> 
    <a href="https://linkedin.com/in/damloop" target="_blank">
      linkedin.com/in/damianlopez
    </a>
  </div>

  <div class="contact-item">
    <span>GitHub:</span> 
    <a href="https://github.com/damloop" target="_blank">
      github.com/Damloop
    </a>
  </div>
</div>

</main>

<footer>
  © 2026 – Portfolio by Damián López
</footer>

</body>
</html>
