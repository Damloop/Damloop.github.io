<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact – Damian Lopez</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --panel: #0d0f14;
      --accent: #00e0ff;
      --text-main: #fff;
      --text-muted: #b8b8b8;
      --border: #1f1f25;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
      width: 100%;
    }

    html, body {
      overflow-x: hidden;
    }

    * {
      box-sizing: border-box;
      max-width: 100%;
    }

    /* --- PREMIUM BACKGROUND (Unified with Home & About) --- */
    body::before {
      content: "";
      position: fixed;
      top: -25%;
      left: -25%;
      width: 150%;
      height: 150%;
      background:
        radial-gradient(circle at 25% 20%, rgba(0, 224, 255, 0.22), transparent 70%),
        radial-gradient(circle at 75% 80%, rgba(0, 150, 255, 0.18), transparent 75%);
      animation: pulseGlow 14s ease-in-out infinite;
      z-index: -1;
      pointer-events: none;
    }

    @keyframes pulseGlow {
      0% { opacity: 0.30; transform: scale(1); }
      50% { opacity: 0.55; transform: scale(1.15); }
      100% { opacity: 0.30; transform: scale(1); }
    }

    /* NAVBAR (Unified with Home & About) */
    .navbar {
      width: 100%;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(22px) saturate(180%);
      border-bottom: 1px solid rgba(0, 224, 255, 0.22);
      box-shadow: 0 4px 35px rgba(0, 224, 255, 0.08);
      z-index: 999;
      flex-wrap: wrap;
    }

    .logo-modern {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: var(--accent);
      padding: 10px 22px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      text-shadow: 0 0 18px rgba(0,200,255,0.6);
      box-shadow: 0 0 22px rgba(0,200,255,0.35);
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      transition: 0.35s ease;
      text-decoration: none;
      margin-bottom: 10px;
    }

    .logo-modern:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 35px rgba(0,200,255,0.9);
      transform: translateY(-4px) scale(1.03);
    }

    .nav-links {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .nav-links a {
      color: var(--text-main);
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: 0.3s;
    }

    .nav-links a:hover {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0,200,255,0.6);
    }

    /* TITLE */
    h1 {
      text-align: center;
      font-size: 3.6rem;
      margin-top: 90px;
      margin-bottom: 50px;
      color: var(--accent);
      text-shadow: 0 0 25px rgba(0,200,255,0.45);
      opacity: 0;
      animation: fadeHero 1.2s ease forwards;
    }

    @keyframes fadeHero {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* CONTACT BOX (Unified with About sections) */
    .contact-box {
      max-width: 850px;
      margin: 0 auto 60px;
      padding: 35px 40px;
      background: linear-gradient(
        to bottom right,
        rgba(13,15,20,0.95),
        rgba(10,12,18,0.75)
      );
      border-radius: 18px;
      border: 1px solid rgba(0,224,255,0.15);
      box-shadow: 0 10px 35px rgba(0,0,0,0.55);
      text-align: center;
      transition: 0.35s ease;
    }

    .contact-box:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 55px rgba(0,200,255,0.25);
      border-color: var(--accent);
    }

    .contact-item {
      margin: 22px 0;
      font-size: 1.25rem;
      color: var(--text-muted);
    }

    .contact-item span {
      color: var(--accent);
      font-weight: 600;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    a:hover {
      text-shadow: 0 0 10px rgba(0,200,255,0.6);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 55px 20px 65px;
      opacity: 0.7;
      font-size: 1rem;
      border-top: 1px solid rgba(0,224,255,0.18);
    }
  </style>
</head>

<body>

<nav class="navbar">
  <a href="/" class="logo-modern">DL</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/contact/">Contact</a>
  </div>
</nav>

<main>

<h1>Contact</h1>

<div class="contact-box">
  <div class="contact-item">
    <span>Email:</span> 
    <a href="mailto:lopez.damian@outlook.com" target="_blank">
      lopez.damian@outlook.com
    </a>
  </div>

  <div class="contact-item">
    <span>LinkedIn:</span> 
    <a href="https://linkedin.com/in/damloop" target="_blank">
      linkedin.com/in/damloop
    </a>
  </div>

  <div class="contact-item">
    <span>GitHub:</span> 
    <a href="https://github.com/damloop" target="_blank">
      github.com/damloop
    </a>
  </div>
</div>

</main>

<footer>
  © 2026-27 – Portfolio by Damian Lopez
</footer>

</body>
</html>
